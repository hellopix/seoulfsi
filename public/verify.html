<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>서울 식중독 위험도 검증판</title>
  <link rel="stylesheet" href="/style.css">
</head>
<body>
  <main class="shell verify">
    <header class="topbar">
      <div>
        <p class="eyebrow">Verification</p>
        <h1>서울특별시 데이터 검증</h1>
        <p class="sub">API 원본에서 서울특별시 전체값과 25개 자치구 행을 함께 표시합니다.</p>
      </div>
      <div class="actions">
        <select id="day" aria-label="날짜 기준">
          <option value="today">오늘</option>
          <option value="tomorrow">내일</option>
          <option value="afterTomorrow">모레</option>
        </select>
        <button id="loadBtn" type="button">불러오기</button>
        <a class="ghost" href="/">지도</a>
      </div>
    </header>

    <section class="panel">
      <div class="panelHead">
        <h2 id="summary">대기 중</h2>
        <span>sd === "서울특별시"</span>
      </div>
      <div class="tableWrap">
        <table id="tbl">
          <thead>
            <tr>
              <th>구분</th>
              <th>지역</th>
              <th>위험값</th>
              <th>보조값</th>
              <th>지수</th>
              <th>단계</th>
              <th>기준일</th>
            </tr>
          </thead>
          <tbody></tbody>
        </table>
      </div>
    </section>

    <section class="panel">
      <h2>원본 미리보기</h2>
      <pre id="rawBox">대기 중</pre>
    </section>
  </main>
  <script src="/verify.js"></script>
</body>
</html>
